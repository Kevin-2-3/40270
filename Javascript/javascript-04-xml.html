<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,td{
            border: 1px solid black
        }
    </style>
</head>
<body>

    <h1>Mostrar Info</h1>
    <button onclick="cargar_informacion()">Cargar</button>
    <table id="tabla">
        <tr>
            <td>1</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>

    <script>
        let datos = ["nombre", "password","jhon",123,"jane",456]
        function cargar_informacion() {
            let tabla = document.getElementById("tabla");
            //tabla.innerHTML += "<tr>";
            let t = "<tr>";
            let contador = 0;
            for (const key in datos){
                const element = datos[key];
                t += "<td>" + element + "</td>"
                if (contador ==2){
                    t += "<tr>"
                }
            }
            tabla.innerHTML = t + "</tr>";
        }
    </script>
    
</body>
</html>
